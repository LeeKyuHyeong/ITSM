name: CI/CD Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ── 1. Test ───────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('itsm-backend/**/*.gradle*', 'itsm-backend/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Backend Test
        working-directory: itsm-backend
        run: ./gradlew test --no-daemon

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Frontend Test
        working-directory: itsm-frontend
        run: |
          npm ci
          npm run test:run

  # ── 2. Build & Push Docker Images ────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('itsm-backend/**/*.gradle*', 'itsm-backend/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Backend JARs
        working-directory: itsm-backend
        run: ./gradlew :itsm-api:bootJar :itsm-batch:bootJar --no-daemon -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push itsm-api
        uses: docker/build-push-action@v5
        with:
          context: itsm-backend
          push: true
          tags: ${{ env.DOCKER_USER }}/itsm-api:latest
          build-args: MODULE=itsm-api

      - name: Build & Push itsm-batch
        uses: docker/build-push-action@v5
        with:
          context: itsm-backend
          push: true
          tags: ${{ env.DOCKER_USER }}/itsm-batch:latest
          build-args: MODULE=itsm-batch

      - name: Build & Push itsm-frontend
        uses: docker/build-push-action@v5
        with:
          context: itsm-frontend
          push: true
          tags: ${{ env.DOCKER_USER }}/itsm-frontend:latest

  # ── 3. Deploy to Server ──────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,deploy/nginx-itsm.conf"
          target: ~/itsm

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/itsm

            # .env 파일 생성/갱신
            cat > .env << 'ENVEOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=https://itsm.kiryong.com
            ENVEOF

            # 호스트 nginx 설정 (최초 1회만 복사)
            NGINX_CONF=/etc/nginx/conf.d/itsm.conf
            if [ ! -f "$NGINX_CONF" ]; then
              sudo cp deploy/nginx-itsm.conf "$NGINX_CONF"

              # SSL 인증서 발급 (certbot)
              if ! sudo certbot certificates 2>/dev/null | grep -q "itsm.kiryong.com"; then
                sudo certbot certonly --nginx -d itsm.kiryong.com --non-interactive --agree-tos -m ${{ secrets.SERVER_USER }}@kiryong.com
              fi

              sudo nginx -t && sudo systemctl reload nginx
            fi

            # 최신 이미지 pull & 재시작
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
